name: CI/CD

on:
    push:
        branches: [main, develop]
        tags: ["v*.*.*"]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

permissions:
    contents: write
    packages: write
    discussions: write

env:
    DOTNET_VERSION: "9.0.x"
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_USE_SHARED_COMPILATION: false

jobs:
    build:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Required for GitVersion

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore .NET workloads (MAUI)
              if: runner.os == 'macOS'
              run: dotnet workload restore

            - name: Install GitVersion
              uses: gittools/actions/gitversion/setup@v1.1.1
              with:
                  versionSpec: "5.x"

            - name: Determine Version
              id: gitversion
              uses: gittools/actions/gitversion/execute@v1.1.1
              with:
                  useConfigFile: true
                  configFilePath: GitVersion.yml

            - name: Display Version
              run: |
                  echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
                  echo "NuGetVersion: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"
                  echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.commitsSinceVersionSource }}"

            - name: Restore dependencies (libraries and tests only)
              run: |
                  # Auto-discover packable library projects; excludes tests, samples, and benchmarks
                  # (those set <IsPackable>false</IsPackable> or omit the property on executable/test targets).
                  # New shippable libraries are picked up automatically once they set <IsPackable>true</IsPackable>.
                  PACKABLE=$(find . -name "*.csproj" -not -path "*/obj/*" | xargs grep -l '<IsPackable>true</IsPackable>' | sort)
                  for proj in $PACKABLE; do
                      dotnet restore "$proj"
                  done
                  # Test projects are not packable but must be restored to run tests
                  dotnet restore R3Ext.Tests/R3Ext.Tests.csproj
                  dotnet restore R3Ext.DynamicData.Tests/R3Ext.DynamicData.Tests.csproj

            - name: Build Libraries (exclude samples)
              run: |
                  export DOTNET_USE_SHARED_COMPILATION=false
                  # Alphabetical sort places R3Ext.Bindings.SourceGenerator before R3Ext (dot < slash),
                  # so the source generator is always built before the main library that references it.
                  # dotnet build also resolves project references automatically, so ordering is belt-and-suspenders.
                  PACKABLE=$(find . -name "*.csproj" -not -path "*/obj/*" | xargs grep -l '<IsPackable>true</IsPackable>' | sort)
                  for proj in $PACKABLE; do
                      dotnet build "$proj" --configuration Release --no-restore \
                        /p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }} \
                        /p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
                        /p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
                        /p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}
                  done

            - name: Test
              run: |
                  export DOTNET_USE_SHARED_COMPILATION=false
                  dotnet test R3Ext.Tests/R3Ext.Tests.csproj --configuration Release --verbosity normal
                  dotnet test R3Ext.DynamicData.Tests/R3Ext.DynamicData.Tests.csproj --configuration Release --verbosity normal

            - name: Pack NuGet packages
              run: |
                  PACKABLE=$(find . -name "*.csproj" -not -path "*/obj/*" | xargs grep -l '<IsPackable>true</IsPackable>' | sort)
                  for proj in $PACKABLE; do
                      dotnet pack "$proj" --configuration Release --no-build --output ./artifacts \
                        /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}
                  done

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: nuget-packages
                  path: ./artifacts/*.nupkg

            - name: Push to NuGet.org
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  dotnet nuget push ./artifacts/*.nupkg \
                    --api-key ${{ secrets.NUGET_API_KEY }} \
                    --source https://api.nuget.org/v3/index.json \
                    --skip-duplicate

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v1
              with:
                  files: ./artifacts/*.nupkg
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
